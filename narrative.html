<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Narrative | The Terrarium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Metrophobic&display=swap');

        :root {
            --bg-color: #0b130e;
            --card-bg: #14221a;
            --text-main: #e2f0e9;
            --neon-green: #39ff14;
            --neon-glow: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Metrophobic', sans-serif;
            line-height: 1.8;
            padding: 20px 15px;
            background-image: radial-gradient(circle at 50% 20%, #173625 0%, #0b130e 70%);
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 60px 0 20px;
            position: relative;
        }

        .menu-btn {
            position: absolute;
            top: 10px;
            left: 0;
            background: none;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 1.4rem;
            cursor: pointer;
            text-shadow: 0 0 5px rgba(57, 255, 20, 0.5);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
            z-index: 10;
            line-height: 1;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.3rem;
            color: #ffffff;
            text-shadow: 0 0 10px var(--neon-glow), 0 0 20px var(--neon-green);
            line-height: 1.2;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header p {
            font-style: italic;
            color: var(--neon-green);
            text-shadow: 0 0 5px rgba(57, 255, 20, 0.5);
            font-size: 1rem;
            letter-spacing: 1px;
        }

        header p span {
            display: block;
        }

        header p .line-two {
            margin-top: 4px;
        }

        @media (min-width: 500px) {
            header p span {
                display: inline;
            }
            header p .line-two {
                margin-top: 0;
            }
            header p .line-one::after {
                content: " / ";
            }
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
            margin: 20px 0 40px;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background-color: #070d0a;
            border-right: 1px solid rgba(57, 255, 20, 0.3);
            z-index: 100;
            transition: left 0.3s ease;
            padding: 30px 20px;
            box-shadow: 5px 0 25px rgba(0,0,0,0.8);
        }

        .sidebar.open {
            left: 0;
        }

        .close-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 1.5rem;
            cursor: pointer;
            float: right;
            margin-bottom: 30px;
        }

        .sidebar h3 {
            font-family: 'Cinzel', serif;
            color: var(--neon-green);
            margin-top: 40px;
            margin-bottom: 20px;
            letter-spacing: 1px;
            font-size: 1.1rem;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            margin-bottom: 20px;
        }

        .sidebar ul li a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.2rem;
            display: block;
            padding: 8px 0;
            border-bottom: 1px solid rgba(226, 240, 233, 0.1);
        }

        .sidebar ul li a:hover, .sidebar ul li a.active {
            color: var(--neon-green);
            border-bottom: 1px solid var(--neon-green);
            padding-left: 5px;
            text-shadow: 0 0 5px rgba(57, 255, 20, 0.5);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 99;
        }

        .overlay.show {
            display: block;
        }

        section {
            background-color: var(--card-bg);
            border: 1px solid rgba(57, 255, 20, 0.15);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        section h2 {
            font-family: 'Cinzel', serif;
            color: #ffffff;
            font-size: 1.4rem;
            margin-bottom: 15px;
            border-bottom: 1px dashed rgba(226, 240, 233, 0.2);
            padding-bottom: 8px;
            text-transform: uppercase;
        }

        section p {
            font-size: 1.1rem;
            color: #f0f7f4;
            white-space: pre-line;
        }

        footer {
            text-align: center;
            padding: 30px 0;
            font-size: 0.85rem;
            color: rgba(226, 240, 233, 0.4);
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <button class="close-btn" onclick="toggleMenu()">&times;</button>
        <h3>Navigation</h3>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="narrative.html" class="active">The Narrative</a></li>
            <li><a href="about.html">About the Project</a></li>
            <li><a href="creators.html">The Creators</a></li>
        </ul>
    </nav>

    <div class="container">
        <header>
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <h1>The Terrarium</h1>
            <p>
                <span class="line-one">The Dandelion Collective</span> 
                <span class="line-two">Botanica / Boomtown 2026</span>
            </p>
        </header>

        <div class="divider"></div>

        <section id="narrative">
            <h2>The Narrative</h2>
            <p></p> 
        </section>

        <footer>
            <p>footer.</p>
        </footer>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }
    </script>
</body>
</html>
